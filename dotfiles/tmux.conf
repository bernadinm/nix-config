###############################################################################
# Tmux configuration (managed by NixOS home-manager)
# Base settings (mouse, terminal, history, indices) are configured in configuration.nix
###############################################################################

set -g set-clipboard on

# Change prefix to Ctrl-b (default)
set -g prefix C-b
unbind C-a
bind C-b send-prefix

# Terminal color overrides
set -ag terminal-overrides ",xterm-256color:RGB"

# Basic bindings
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Clear and high-contrast colors
set -g status-style "bg=#1a1a1a fg=#ffffff"
set -g pane-border-style "fg=#444444"
set -g pane-active-border-style "fg=#00ff00"

# Vim style pane selection
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Status bar configuration with centered windows
set -g status-position bottom
set -g status-justify centre   # Centers the window list

# Status bar lengths
set -g status-left-length 60
set -g status-right-length 80

# Dracula theme
set -g status-style bg='#282a36',fg='#f8f8f2'
set -g window-status-current-style bg='#ff79c6',fg='#282a36'

# prefix-highlight colors
set -g @prefix_highlight_fg '#282a36'
set -g @prefix_highlight_bg '#ff79c6'
set -g @prefix_highlight_copy_mode_attr 'fg=#282a36,bg=#8be9fd'
set -g @prefix_highlight_show_copy_mode 'on'

# Status bar format - left: host + prefix highlight | right: set by battery plugin extraConfig
set -g status-left '#[fg=green]#H #[fg=#6272a4]• #[fg=green,bright]#(uname -r | cut -c 1-6)#[default] #{prefix_highlight}'

# Window status format
setw -g window-status-format ' #I:#W '
setw -g window-status-current-format ' #I:#W '

# vim copy mode with Wayland clipboard
set -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel 'wl-copy'
bind-key -T copy-mode-vi Enter send -X copy-pipe-and-cancel 'wl-copy'

# fzf-tmux-url settings
set -g @fzf-url-fzf-options '-p 60%,30% --prompt="URL > " --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'
