setw -g mode-keys vi

# Status bar configuration
set -g status on
set -g status-interval 2
set -g status-position bottom
set -g status-justify left
set -g status-style 'bg=colour234 fg=colour137'

# Left status: session name
set -g status-left '#[fg=colour233,bg=colour245,bold] #S '
set -g status-left-length 20

# Right status: Bluetooth | Battery | Time
set -g status-right '#[fg=colour233,bg=colour241,bold] #(if lsmod | grep -q btusb; then echo "  ON"; else echo "  OFF"; fi) #[fg=colour233,bg=colour245,bold] BAT: #(cat /sys/class/power_supply/BAT*/capacity 2>/dev/null || echo "N/A")% #[fg=colour233,bg=colour241,bold] %H:%M '
set -g status-right-length 60

# Window status
setw -g window-status-current-style 'fg=colour1 bg=colour238 bold'
setw -g window-status-current-format ' #I:#W#F '
setw -g window-status-style 'fg=colour250 bg=colour235'
setw -g window-status-format ' #I:#W#F '
