###############################################################################
# Cross-platform tmux configuration
###############################################################################
# Change prefix to Ctrl-b
set -g prefix C-b
unbind C-a
bind C-b send-prefix

# Terminal settings
set -g default-terminal "xterm-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Mouse support
set -g mouse on

# Start windows at 1
set -g base-index 1
set -g pane-base-index 1

# History
set -g history-limit 50000

# Basic bindings
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Clear and high-contrast colors
set -g status-style "bg=#1a1a1a fg=#ffffff"
set -g pane-border-style "fg=#444444"
set -g pane-active-border-style "fg=#00ff00"

# Vim style pane selection
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Status bar configuration with centered windows
set -g status-position bottom
set -g status-justify centre   # Centers the window list

# Status bar lengths
set -g status-left-length 40
set -g status-right-length 40

# Status bar format
set -g status-left '#[fg=green]#H #[fg=black]• #[fg=green,bright]#(uname -r | cut -c 1-6)#[default]'
set -g status-right '#[fg=white,bg=default]%a%l:%M:%S %p#[default] #[fg=blue]%Y-%m-%d'

# Window status format
setw -g window-status-format ' #I:#W '
setw -g window-status-current-format ' #I:#W '

# Dracula theme
set -g status-style bg='#282a36',fg='#f8f8f2'
set -g window-status-current-style bg='#ff79c6',fg='#282a36'

# vim copy mode with Wayland clipboard
set -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel 'wl-copy'
bind-key -T copy-mode-vi Enter send -X copy-pipe-and-cancel 'wl-copy'

# Resurrect plugin settings (capture pane contents and vim sessions)
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-vim 'session'

# Continuum plugin settings (auto-restore and auto-save on boot)
set -g @continuum-boot 'on'
