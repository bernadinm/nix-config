general {
    lock_cmd = pidof swaylock || swaylock -f -c 000000  # Lock screen (avoid starting multiple instances)
    before_sleep_cmd = loginctl lock-session            # Lock before suspend
    after_sleep_cmd = hyprctl dispatch dpms on          # Turn on display after resume
}

# Lock screen after 15 minutes of inactivity (only on battery - AC offline)
listener {
    timeout = 900  # 15 minutes in seconds
    on-timeout = bash -c '[[ $(cat /sys/class/power_supply/ACAD/online) == "0" ]] && loginctl lock-session'
}

# Turn off screen 30 seconds after lock (only on battery - AC offline)
listener {
    timeout = 930  # 15.5 minutes
    on-timeout = bash -c '[[ $(cat /sys/class/power_supply/ACAD/online) == "0" ]] && hyprctl dispatch dpms off'
    on-resume = hyprctl dispatch dpms on    # Turn display back on
}

# Hibernate after 30 minutes of inactivity (only on battery - AC offline)
listener {
    timeout = 1800  # 30 minutes in seconds
    on-timeout = bash -c '[[ $(cat /sys/class/power_supply/ACAD/online) == "0" ]] && systemctl hibernate'
}
